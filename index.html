    <script>
      (async function() {
        try {
          const res = await fetch('https://api.themoviedb.org/3/movie/now_playing?api_key=%VITE_TMDB_API_KEY%&language=pt-BR');
          const data = await res.json();
          window.__TMDB_NOW_PLAYING__ = data.results;
          if (data && data.results && data.results[0]) {
            const path = data.results[0].backdrop_path;
            const isMobile = window.innerWidth < 768;
            const size = isMobile ? 'w500' : 'w1280';
            const link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'image';
            link.fetchPriority = 'high';
            link.href = 'https://image.tmdb.org/t/p/' + size + path;
            document.head.appendChild(link);
          }
        } catch(e) {}
      })();
    </script>
