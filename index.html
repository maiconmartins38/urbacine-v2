<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbaCine</title>
    <meta name="description" content="A melhor experiência de streaming com catálogo atualizado do TMDB." />
    
    <!-- Resource Hints para acelerar o carregamento -->
    <link rel="preconnect" href="https://api.themoviedb.org" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Outfit:wght@400;600;800&display=swap" as="style" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Outfit:wght@400;600;800&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Outfit:wght@400;600;800&display=swap" />
    </noscript>
    <link rel="dns-prefetch" href="https://api.themoviedb.org" />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    
    <!-- Preload crítico para evitar Flash of Invisible Text -->
    <link rel="modulepreload" href="/src/main.jsx" />
    
    <script>
      (async function() {
        try {
          const res = await fetch('https://api.themoviedb.org/3/movie/now_playing?api_key=%VITE_TMDB_API_KEY%&language=pt-BR');
          const data = await res.json();
          if (data && data.results && data.results[0]) {
            const path = data.results[0].backdrop_path;
            const isMobile = window.innerWidth < 768;
            const size = isMobile ? 'w780' : 'w1280';
            const link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'image';
            link.fetchPriority = 'high';
            link.href = 'https://image.tmdb.org/t/p/' + size + path;
            document.head.appendChild(link);
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        body { margin: 0; background-color: #050505; color: #ffffff; }
        .startup-loader {
          display: flex; justify-content: center; align-items: center; 
          height: 100vh; width: 100vw; background-color: #050505;
        }
        .startup-spinner {
          width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
          border-top: 3px solid #e50914; border-radius: 50%;
          animation: startup-spin 1s linear infinite;
        }
        @keyframes startup-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
      <div class="startup-loader">
        <div class="startup-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
